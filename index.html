<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CANON - Lucky Draw System</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="styles.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
</head>
<body>

  <div id="app">
    <header class="hud-header">
      <div class="brand">
        <div class="brand-icon canon-brand-icon">CANON</div>
        <div class="brand-text">
          <span class="brand-title">CANON</span>
          <span class="brand-subtitle">LUCKY DRAW</span>
        </div>
      </div>

      <div class="hud-status-group">
        <div class="telemetry-item">
          <span class="telemetry-label">ผู้เข้าร่วมทั้งหมด</span>
          <span class="telemetry-value" id="totalParticipantsCount">0</span>
        </div>
        <div class="telemetry-item">
          <span class="telemetry-label">พร้อมสุ่ม</span>
          <span class="telemetry-value" style="color: var(--green-active);" id="eligibleCount">0</span>
        </div>
        <div class="telemetry-item">
          <span class="telemetry-label">ผู้โชคดีสะสม</span>
          <span class="telemetry-value" style="color: var(--amber-warning);" id="totalWinnersCount">0</span>
        </div>

        <div class="status-badge">
          <div class="status-dot"></div> SYSTEM ONLINE
        </div>

        <div class="header-actions">
          <button class="icon-btn" id="prizesBtn" title="จัดการของรางวัล" style="color: var(--green-active); border-color: var(--green-active);"><i class="fas fa-gift"></i></button>
          <button class="icon-btn" id="qrBtn" title="สร้าง QR Code ลงทะเบียน" style="color: var(--amber-warning); border-color: var(--amber-warning);"><i class="fas fa-qrcode"></i></button>
          <button class="icon-btn" id="soundToggleBtn" title="เปิด/ปิด เสียงเอฟเฟกต์"><i class="fas fa-volume-up"></i></button>
          <button class="icon-btn" id="manageBtn" title="จัดการรายชื่อ (CSV)"><i class="fas fa-users"></i></button>
          <button class="icon-btn" id="historyBtn" title="ประวัติผู้โชคดี"><i class="fas fa-trophy"></i></button>
          <button class="icon-btn" id="fullscreenBtn" title="เต็มจอ (F)"><i class="fas fa-expand"></i></button>
        </div>
      </div>
    </header>

    <main class="main-stage">
      <div class="hud-corner-tl"></div><div class="hud-corner-tr"></div>
      <div class="hud-corner-bl"></div><div class="hud-corner-br"></div>

      <div class="stage-prize-showcase">
        <div class="showcase-card">
          <div class="showcase-img-wrapper">
            <img src="https://images.unsplash.com/photo-1546868871-7041f2a55e12?w=600&auto=format&fit=crop" id="stagePrizeImg" class="showcase-prize-img" alt="Prize">
          </div>
          <div class="showcase-info">
            <h2 class="showcase-prize-title" id="stagePrizeTitle">รางวัลใหญ่ Grand Prize</h2>
          </div>
        </div>
      </div>

      <div class="stage-particle-wrapper">
        <canvas id="particleCanvas"></canvas>
      </div>
    </main>

    <footer class="control-bar">
      <div class="prize-selector-group">
        <span class="prize-label"><i class="fas fa-gift"></i> เลือกระดับรางวัล:</span>
        <select id="prizeSelect" class="cyber-select"></select>
      </div>

      <div class="draw-btn-wrapper">
        <button id="drawBtn" class="draw-btn"><i class="fas fa-bolt"></i> เริ่มจับรางวัล</button>
      </div>

      <div class="batch-selector-group">
        <span class="prize-label"><i class="fas fa-users"></i> สุ่มรอบละ:</span>
        <span class="batch-badge" id="activeBatchDisplay">1 คน</span>
      </div>
    </footer>
  </div>

  <canvas id="confettiCanvas"></canvas>

  <!-- JS Engine Scripts -->
  <script src="js/modalTemplates.js"></script>
  <script src="js/soundEngine.js"></script>
  <script src="js/particleSphere.js"></script>
  <script src="js/cloudSync.js"></script>
  <script src="js/prizeManager.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
